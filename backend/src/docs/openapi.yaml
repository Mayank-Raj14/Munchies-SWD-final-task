# Store APIs

## Get All Stores

### Endpoint

```http
GET /api/stores
```

### Query Parameters

| Param    | Description      |
| -------- | ---------------- |
| page     | Pagination page  |
| limit    | Items per page   |
| hostelId | Filter by hostel |
| search   | Store search     |

---

## Get Store By ID

### Endpoint

```http
GET /api/stores/:id
```

---

## Create Store

### Endpoint

```http
POST /api/stores
```

### Protected

Yes (`STORE_OWNER` or `ADMIN`)

### Request Body

```json
{
  "name": "Night Canteen",
  "description": "Late night snacks",
  "hostelId": "hostel-id"
}
```

---

## Update Store

### Endpoint

```http
PATCH /api/stores/:id
```

### Protected

Yes

---

## Delete Store

### Endpoint

```http
DELETE /api/stores/:id
```

### Protected

Yes

---

