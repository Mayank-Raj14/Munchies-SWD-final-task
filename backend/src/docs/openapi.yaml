# API Documentation

Base URL:

```text
http://localhost:5000/api
```

Authentication:

* JWT Bearer Token
* Protected routes require:

```http
Authorization: Bearer <token>
```

---

# Authentication APIs

## Register User

### Endpoint

```http
POST /api/auth/register
```

### Request Body

```json
{
  "name": "Mayank",
  "email": "mayank@example.com",
  "password": "password123",
  "hostelId": "hostel-id"
}
```

### Response

```json
{
  "token": "jwt-token",
  "user": {
    "id": "user-id",
    "email": "mayank@example.com",
    "role": "USER"
  }
}
```

---

## Login

### Endpoint

```http
POST /api/auth/login
```

### Request Body

```json
{
  "email": "mayank@example.com",
  "password": "password123"
}
```

---

## Current User

### Endpoint

```http
GET /api/auth/me
```

### Protected

Yes

