services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: munchies
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d munchies"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/munchies?schema=public
      FRONTEND_ORIGIN: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

  studio:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/munchies?schema=public
    command: sh -c "npx prisma migrate deploy && npx prisma generate && npx prisma studio --schema=prisma/schema.prisma --port 5555 --browser none --hostname 0.0.0.0"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    ports:
      - "5555:5555"

volumes:
  pg_data: